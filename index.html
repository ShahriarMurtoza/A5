<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github-Issue-Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind+daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- fontkit -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./style.css">

  <style>*{font-family: "Outfit", sans-serif;}</style>

  </head>
  <body class="min-h-screen max-w-md bg-base-200 py-[-15px] mx-auto">
    <div class="logo  text-center  mx-auto pt-32">
      <img class=" mx-auto" src="./assets/github-logo.png" alt="GitHub Logo">
    <h1 class="name font-bold text-2xl">GitHub Issues Tracker</h1>
    <p>Sign in to manage your issues</p>
    </div>
    <div class="form pt-10">
      <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl mx-auto rounded-2xl">
        <div class="card-body">
          <fieldset class="fieldset">
          <label class="label">Username</label>
            <!-- admin -->
            <input id="input-name"  maxlength="5" type="text" class="input rounded-full" placeholder="Username" />
          <p>Default: admin</p>
            <br>

            <!-- admin123 -->
          <label class="label">Password</label>
            <input id="input-pass" type="password" class="input  rounded-full" placeholder="Enter your password" />
          <p>default: admin123</p>

          <div  id="login-btn" class="btn blue mt-4"><button>Sign in</button></div>
            <hr>
          <p class="demo text-center">Demo Credentials :</p>
            <div class="card bg-base-100 w-full max-w-sm shadow-2xl py-5 text-center rounded-2xl">
            <p>Username: admin</p>
            <p>Password: admin123</p>
            </div>
          </fieldset>
        </div>
      </div>
    </div>



  <script src="./login.js"></script>
  </body>
</html>
