<!DOCTYPE html>
<html lang="en">
  <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Issue-Tracker Home</title>

    <link rel="shortcut icon" href="./assets/github-logo.png">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <style>
      *{
        font-family:"Outfit",sans-serif;
      }
    </style>

  </head>


  <body class="bg-base-200 min-h-screen py-8">

    <div class="container mx-auto px-4">

      <!-- HEADER -->

      <div class="flex justify-between items-center mb-8">

        <div class="flex items-center gap-4">

          <img src="./assets/github-logo.png" alt="GitHub logo" class="w-10">

          <h1 class="text-3xl font-bold">
            GitHub Issues Tracker
          </h1>

        </div>

        <div class="flex gap-3 items-center">

          <input
          id="search-input"
          type="text"
          placeholder="Search issues..."
          class="input input-bordered input-sm w-60"
          />

          <button class="btn btn-sm btn-success">
            + New Issue
          </button>

        </div>

      </div>


      <!-- FILTER TABS -->

      <div class="flex gap-2 mb-6">

        <button id="all-tab" class="btn btn-sm bg-purple-600 text-white">
          All
        </button>

        <button id="open-tab" class="btn btn-sm btn-outline">
          Open
        </button>

        <button id="closed-tab" class="btn btn-sm btn-outline">
          Closed
        </button>

      </div>


      <!-- ISSUES HEADER -->

      <div class="bg-base-100 p-6 rounded-xl shadow mb-6 flex justify-between items-center">

        <div>

          <h2 class="text-xl font-bold">
            50 Issues
          </h2>

          <p class="text-sm text-gray-500">
            Track and manage your project issues
          </p>

        </div>

        <div class="flex gap-6 text-sm">

          <span class="flex items-center gap-2">
          <span class="w-3 h-3 bg-green-500 rounded-full"></span>
            Open
          </span>

          <span class="flex items-center gap-2">
          <span class="w-3 h-3 bg-red-500 rounded-full"></span>
            Closed
          </span>

        </div>

      </div>


      <!-- LOADING -->

      <div id="loading" class="text-center py-12">

      <span class="loading loading-spinner loading-lg"></span>

        <p class="mt-4 text-lg">
          Loading issues...
        </p>

      </div>


      <!-- ERROR -->

      <div id="error" class="hidden alert alert-error mb-6">

      <span id="error-msg"></span>

      </div>


      <!-- ISSUES GRID -->

      <div
      id="issues-container"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
    ></div>

  </div>


  <!-- ISSUE DETAILS MODAL -->

  <dialog id="issueModal" class="modal">

    <div class="modal-box">

    <h3 id="modal-title" class="font-bold text-lg mb-3"></h3>

    <p id="modal-description" class="mb-4 text-gray-600"></p>

      <div class="space-y-2 text-sm">

      <p><b>Status:</b> <span id="modal-status"></span></p>

      <p><b>Priority:</b> <span id="modal-priority"></span></p>

      <p><b>Labels:</b> <span id="modal-labels"></span></p>

      <p><b>Assigned To:</b> <span id="modal-assigned"></span></p>

      <p><b>Created:</b> <span id="modal-created"></span></p>

      </div>

      <div class="modal-action">

        <button onclick="closeModal()" class="btn">
          Close
        </button>

      </div>

    </div>

  </dialog>


<script src="./issues.js"></script>

</body>
</html>
